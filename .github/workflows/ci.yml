name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache in other jobs
          cache: false
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test --workspace --all-features

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p boltffi_cli

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo build --release -p boltffi_cli
      - run: ./target/release/boltffi --version

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo doc --workspace --no-deps

  miri:
    name: Miri
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target-miri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo +nightly miri setup
      - run: cargo +nightly miri test -p boltffi -p boltffi_tests

  android-packaging:
    name: Android Packaging (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: benchmarks/rust-boltffi
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: android-packaging-${{ matrix.os }}
          workspaces: |
            .
            benchmarks/rust-boltffi
      - run: cargo run -p boltffi_cli --manifest-path ../../Cargo.toml -- check --android --fix
      - run: cargo run -p boltffi_cli --manifest-path ../../Cargo.toml -- -v pack android

  demo-platforms:
    name: Demo Platforms (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # caching handled by Swatinem/rust-cache below
          cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: demo-platforms-${{ matrix.os }}-${{ matrix.python-version }}
      - if: matrix.python-version == '3.13'
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      - if: matrix.python-version == '3.13'
        run: npm install -g typescript
      - if: matrix.python-version == '3.13'
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}
      - run: python -m pip install --upgrade pip setuptools wheel
      - if: matrix.python-version == '3.13'
        run: ./examples/demo/verify-platform-demos.sh --host-defaults --python python
        shell: bash
      - if: matrix.python-version != '3.13'
        run: ./examples/demo/verify-platform-demos.sh --platform python --python python
        shell: bash
