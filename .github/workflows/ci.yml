name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo test --workspace --all-features

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }} -p boltffi_cli

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo build --release -p boltffi_cli
      - run: ./target/release/boltffi --version

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - run: cargo doc --workspace --no-deps

  miri:
    name: Miri
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: target-miri
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: cargo miri setup
      - run: cargo miri test -p boltffi -p boltffi_tests

  cross-build:
    name: Cross Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: benchmarks/rust-boltffi
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: cross-${{ matrix.os }}
          workspaces: |
            .
            benchmarks/rust-boltffi
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm install -g typescript
      - uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}
      - run: cargo install --path ../../boltffi_cli
      - if: matrix.os == 'macos-latest'
        run: boltffi check --fix
      - if: matrix.os == 'macos-latest'
        run: boltffi -v pack all
      - if: matrix.os != 'macos-latest'
        run: boltffi check --android --wasm --fix
      - if: matrix.os != 'macos-latest'
        run: boltffi -v pack android
      - if: matrix.os != 'macos-latest'
        run: boltffi -v pack wasm

  python-packaging:
    name: Python Packaging (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    defaults:
      run:
        working-directory: examples/demo
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: python-packaging-${{ matrix.os }}-${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip setuptools wheel
      - run: rm -rf dist/python .tmp/python-smoke
      - run: |
          cat <<'TOML' > boltffi.python.ci.toml
          [targets.python]
          enabled = true
          output = "dist/python"
          TOML
      - run: cargo run -p boltffi_cli --manifest-path ../../Cargo.toml -- --overlay boltffi.python.ci.toml pack python --release --experimental --python python
      - run: python -m pip install --target .tmp/python-smoke dist/python/wheelhouse/*.whl
      - run: |
          python - <<'PY'
          import pathlib
          import sys

          sys.path.insert(0, str(pathlib.Path(".tmp/python-smoke").resolve()))

          import demo

          assert demo.echo_i32(7) == 7
          assert abs(demo.add_f64(1.5, 2.25) - 3.75) < 1e-12
          assert demo.negate_bool(True) is False
          PY
